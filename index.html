<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Group Planner</title>
  <link rel="stylesheet" href="style.css?v=0.3">
</head>
<body>
  <header class="topbar">
    <div class="header-brand">
      <h1>Research Group Planner <span class="version">v0.3</span></h1>
      <div id="fileStatus" class="muted">Unsaved project</div>
    </div>

    <nav class="header-tabs" aria-label="Views">
      <button data-tab="timeline" class="active">Assignments</button>
      <button data-tab="persons">Persons</button>
      <button data-tab="projects">Projects</button>
      <button data-tab="accounts">Accounts</button>
      <button data-tab="expenses">Expenses</button>
      </nav>

    <nav class="toolbar" aria-label="File actions">
      <button id="newBtn">New</button>
      <button id="openBtn">Open…</button>
      <button id="loadTestDataBtn">Load example data</button>
      <button id="saveBtn">Save</button>
      <button id="saveAsBtn">Save As…</button>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </nav>

    <div id="person-palette" class="person-palette" hidden></div>
  </header>

  <main>
    <section id="dashboard" class="panel dashboard"></section>

    <section id="tab-persons" class="tab panel active"></section>
    <section id="tab-projects" class="tab panel"></section>
    <section id="tab-accounts" class="tab panel"></section>
<section id="tab-expenses" class="tab panel"></section>
    <section id="tab-timeline" class="tab panel"></section>
</main>

  <script src="app.js?v=0.3"></script>
  <footer class="site-footer">
    <a href="GETTING_STARTED.html" target="_blank" rel="noopener">Getting Started</a>
  </footer>
</body>
</html>
